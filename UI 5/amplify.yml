version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Installing Node.js dependencies..."
        - npm ci
    build:
      commands:
        - echo "Build phase - Express app ready"
  artifacts:
    baseDirectory: /
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'X-Content-Type-Options'
          value: 'nosniff'
        - key: 'X-Frame-Options'
          value: 'DENY'
        - key: 'X-XSS-Protection'
          value: '1; mode=block'



